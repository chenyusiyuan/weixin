<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>金融客服评测后台</title>
    <link rel="stylesheet" href="/demo-assets/styles.css?v=20260527-intent-review" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="view-switch">
          <button id="evalViewBtn" class="active" type="button">批量评测</button>
          <button id="analyticsViewBtn" type="button">结果分析</button>
          <button id="adminViewBtn" type="button">数据后台</button>
        </div>
        <div id="evalSidebarPanel" class="sidebar-panel">
          <div class="sidebar-title">评测工作台</div>
          <input id="evalTxtInput" type="file" accept=".txt,text/plain" multiple hidden />
          <div class="eval-compact-actions">
            <button id="evalImportBtn" class="primary" type="button">导入 TXT</button>
            <button id="evalGenerateSelectedBtn" type="button">生成选中</button>
            <button id="evalDeleteBtn" class="danger" type="button">删除选中</button>
          </div>
          <label class="eval-side-label">视角
            <select id="evalViewSelect"></select>
          </label>
          <div class="sidebar-title">TXT 列表</div>
          <div id="evalFileList" class="eval-file-list"></div>
        </div>
        <div id="analyticsSidebarPanel" class="sidebar-panel hidden">
          <div class="sidebar-title">结果筛选</div>
          <label class="eval-side-label">模型
            <select id="analyticsModelFilter"></select>
          </label>
          <label class="eval-side-label">二级意图
            <select id="analyticsIntentFilter">
              <option value="">全部意图</option>
            </select>
          </label>
          <label class="eval-side-label">状态
            <select id="analyticsStatusFilter">
              <option value="">全部状态</option>
              <option value="completed">已完成</option>
              <option value="partial_failed">部分失败</option>
              <option value="error">失败</option>
              <option value="running">生成中</option>
              <option value="cancelled">已取消</option>
            </select>
          </label>
          <label class="eval-filter-check">
            <input id="analyticsBadcaseOnly" type="checkbox" />
            只看 TXT Badcase
          </label>
          <button id="analyticsRefreshBtn" class="primary wide" type="button">刷新看板</button>
          <button id="analyticsExportBtn" class="wide" type="button">导出看板 JSON</button>
        </div>
        <div id="adminSidebarPanel" class="sidebar-panel hidden">
          <div class="sidebar-title">数据资源</div>
          <div id="resourceNav" class="resource-nav"></div>
          <button id="resetDataBtn" class="danger subtle wide" type="button">重置 mock 数据</button>
        </div>
      </aside>

      <main id="evalView" class="eval-layout">
        <section class="eval-content">
          <header class="eval-toolbar">
            <div>
              <h2 id="evalDialogueTitle">评测工作台</h2>
              <p id="evalDialogueSub">导入 TXT 后，按模型生成每句客户 query 的话术推荐并人工标注</p>
            </div>
            <div class="eval-toolbar-actions">
              <button id="evalProgressBtn" type="button">生成进度</button>
              <label class="model-control">生成模型
                <select id="evalModelSelect"></select>
              </label>
              <button id="evalRunDialogueBtn" class="primary" type="button">生成当前 TXT</button>
              <button id="evalExportBtn" type="button">导出结果</button>
            </div>
          </header>
          <div id="evalWorkspacePanel" class="eval-workspace-panel">
            <div id="evalConversation" class="eval-conversation"></div>
          </div>
        </section>

        <aside class="eval-inspector">
          <div class="panel-head">
            <h3>当前结果</h3>
            <button id="evalResetRatingsBtn" type="button">重置评分</button>
          </div>
          <div id="evalRunSummary" class="eval-run-summary"></div>
          <div id="evalBadcaseList" class="eval-badcase-list"></div>
        </aside>
      </main>

      <main id="analyticsView" class="analytics-layout hidden">
        <section class="analytics-content">
          <header class="analytics-hero">
            <div>
              <p>评测结果</p>
              <h2>结果分析看板</h2>
              <span id="analyticsSubtitle">按模型、意图和 TXT Badcase 聚合查看话术推荐质量</span>
            </div>
            <div class="analytics-hero-actions">
              <button id="analyticsAllQuickBtn" type="button">全部结果</button>
              <button id="analyticsBadcaseQuickBtn" class="danger" type="button">只看 TXT Badcase</button>
            </div>
          </header>
          <div id="evalAnalyticsFilters" class="analytics-filter-chips"></div>
          <div id="evalAnalyticsSummary" class="eval-analytics-summary"></div>
          <div id="evalAnalyticsTables" class="eval-analytics-tables"></div>
        </section>
      </main>

      <main id="adminView" class="admin-layout hidden">
        <section class="admin-content">
          <div class="admin-toolbar">
            <div>
              <h2 id="resourceTitle">客户人设</h2>
              <p id="resourceHint">选择记录后可编辑 JSON 字段</p>
            </div>
            <div class="inline-controls">
              <input id="ownerFilter" placeholder="按 customer_id 过滤" />
              <button id="loadResourceBtn" type="button">刷新</button>
              <button id="newRecordBtn" class="primary" type="button">新建记录</button>
            </div>
          </div>
          <div class="data-workspace">
            <div id="recordList" class="record-list"></div>
            <div class="editor">
              <div class="field-row">
                <label>owner_id<input id="editOwner" /></label>
                <label>record_id<input id="editRecordId" /></label>
              </div>
              <div id="quickFields" class="quick-fields"></div>
              <label class="json-editor-label">完整 JSON</label>
              <textarea id="payloadEditor" class="payload-editor"></textarea>
              <div class="editor-actions">
                <button id="saveRecordBtn" class="primary" type="button">保存</button>
                <button id="deleteRecordBtn" class="danger" type="button">删除</button>
              </div>
            </div>
          </div>
        </section>

      </main>
    </div>

    <dialog id="evalGenerateDialog" class="eval-dialog">
      <form method="dialog">
        <div class="eval-dialog-head">
          <h3 id="evalGenerateDialogTitle">生成评测</h3>
          <button id="evalGenerateDialogClose" type="button" aria-label="关闭">×</button>
        </div>
        <label>模型
          <select id="evalGenerateProfileSelect"></select>
        </label>
        <div class="eval-dialog-grid">
          <label>并发
            <input id="evalGenerateConcurrencyInput" type="number" min="1" max="12" value="3" />
          </label>
          <label>超时秒
            <input id="evalGenerateTimeoutInput" type="number" min="5" max="300" value="60" />
          </label>
        </div>
        <label class="eval-dialog-check">
          <input id="evalGenerateRetryOnlyInput" type="checkbox" />
          只重试失败
        </label>
        <div class="eval-dialog-actions">
          <button id="evalGenerateDialogCancel" type="button">取消</button>
          <button id="evalGenerateDialogStart" class="primary" type="button">开始生成</button>
        </div>
      </form>
    </dialog>

    <dialog id="evalProgressDialog" class="eval-dialog eval-progress-dialog">
      <form method="dialog">
        <div class="eval-dialog-head">
          <h3>生成进度</h3>
          <button id="evalProgressDialogClose" type="button" aria-label="关闭">×</button>
        </div>
        <div id="evalProgressList" class="eval-progress-list"></div>
        <div class="eval-dialog-actions">
          <button id="evalProgressRefreshBtn" type="button">刷新</button>
          <button id="evalProgressDialogDone" class="primary" type="button">关闭</button>
        </div>
      </form>
    </dialog>

    <script src="/demo-assets/app.js?v=20260527-intent-options"></script>
  </body>
</html>
