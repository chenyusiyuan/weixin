---
skill_id: loan_dispute_refund
name: 借款争议特殊场景退费
description: 处理借款争议相关的特殊退费场景，包括客户声称非本人操作借款、遭遇诈骗、未收到借款等特殊情况下的退费申请
domain: 费用
intent_hierarchy:
  l1: 费用相关
  l2: 借款争议
  l3: 费用
route_mode: tool_only
risk_level: high


triggers:
  keywords:
    - 借款争议
    - 非本人借款
    - 未授权借款
    - 被人冒用
    - 没有借款
    - 我没有申请
    - 被诈骗借款
    - 被骗贷款
    - 账号被盗
    - 我不知道有这笔借款
  examples:
    - 我没有申请这笔借款
    - 这个借款不是我操作的
    - 我被骗了钱被转走了
    - 有人用我的账号借款
    - 这笔贷款我不知情
    - 我被诈骗了要求退款
  exclude_keywords:
    - 退费进度
    - 溢余退款

tools:
  required:
    - get_customer_profile
    - get_bill_and_repayment_plan
  optional:
    - get_loan_service_info
    - get_refund_history
    - query_ticket

templates:
  first_contact:
    script: |
      为了确保信息安全，跟您简单核对几项基本资料，请问您的{verification_info}？
    required_slots:
      - verification_info
    next_step: verify_identity
  follow_up:
    script: |
      {customer_name}，您好。我非常理解您的担忧，这边会认真核查您反映的情况。
      请您告知：
      1. 您具体是指哪笔借款（借款时间/金额）？
      2. 您是如何发现这笔争议借款的？
      3. 是否已向公安机关报案？
      我们会根据您提供的信息和系统记录进行核查，如确认存在异常，会按照相关规定为您处理。
    required_slots:
      - customer_name
    next_step: investigate_dispute

branch_conditions:
  - hint: 客户声称非本人操作，系统显示正常借款流程
    variant: claimed_unauthorized_normal_process
    note: |
      核查借款申请记录：借款申请是通过您的账号完成的，包括实名认证、人脸识别、合同签署等步骤，全部操作均来自您的设备。
      如您认为账号被盗，建议立即修改密码并向公安机关报案，提供报案证明后我们进一步核查处理。
  - hint: 客户提供公安报案证明，声称被诈骗
    variant: fraud_with_police_report
    note: |
      收到报案证明后，按照诈骗借款争议流程提交工单，转专项处理团队核查。
      告知客户：我们会认真核查，处理结果将在{processing_days}个工作日内告知。
  - hint: 客户声称未收到借款金额
    variant: loan_amount_not_received
    note: |
      核查放款记录，确认放款账户和金额。如系统显示已放款，提供放款凭证（银行流水信息），建议客户核查对应银行账户。
  - hint: 客户声称是被诱导贷款
    variant: induced_loan_claim
    note: |
      了解被诱导的具体情况，核查借款申请记录。操作借款时系统均会展示相关信息及确认页面，所有信息均需本人填写上传，合同也需本人签署认可才会放款。
  - hint: 核查后确认存在异常
    variant: confirmed_anomaly
    note: 提交工单走特殊退费申请，告知处理时效
compliance:
  forbidden_expressions:
    - 肯定是您操作的
    - 不可能被盗
    - 我们没有责任
    - 保证退款
    - 马上帮您处理
  required_disclaimer: 借款争议处理需要完整核查借款记录和相关凭证，处理时效视情况而定，请配合提供所需材料。
  must_include_when:
    - condition: 客户声称被诈骗时
      text: 如确认遭遇诈骗，建议立即向公安机关报案，并提供报案证明配合我们的核查处理。
    - condition: 核查借款记录时
      text: 借款申请记录包括实名认证、人脸识别及合同签署，所有步骤均需本人操作完成。
    - condition: 提交工单时
      text: 争议处理申请已提交，处理时效一般为5-7个工作日，结果将以短信通知您。

escalation:
  - trigger: 客户提供公安报案证明
  - trigger: 核查发现借款流程存在异常
  - trigger: 涉及金额较大的借款争议
  - trigger: 客户声称将采取法律行动

fallback:
  answer: 关于借款争议，需要详细核查您的借款记录，请先配合核实身份信息，并提供争议借款的相关信息。
  next_step: verify_identity
slot_sources:
  customer_name: tool:get_customer_profile.name
  verification_info: derived:verification_info
escalation_signals: []
