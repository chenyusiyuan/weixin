---
skill_id: loan_dispute_refund
name: 借款争议特殊场景退费
description: 处理借款争议相关的特殊退费场景，包括客户声称非本人操作借款、遭遇诈骗、未收到借款等特殊情况下的退费申请
domain: 费用
intent_hierarchy:
  l1: 费用相关
  l2: 借款争议
  l3: 费用
route_mode: tool_only
risk_level: high


triggers:
  keywords:
    - 借款争议
    - 非本人借款
    - 未授权借款
    - 被人冒用
    - 没有借款
    - 我没有申请
    - 被诈骗借款
    - 被骗贷款
    - 账号被盗
    - 我不知道有这笔借款
    - 我不需要这笔借款
    - 再借一笔
    - 预约借款
    - 解约失败放款
    - 悦享金
    - 福利金
    - 借款犹豫期
    - 本金清贷
    - 费用不承担
    - 核实订单
    - 核实客户订单
    - 查询哪笔订单
  examples:
    - 我没有申请这笔借款
    - 这个借款不是我操作的
    - 我被骗了钱被转走了
    - 有人用我的账号借款
    - 这笔贷款我不知情
    - 我被诈骗了要求退款
    - 我就打开APP看了一下就给我放款了
    - 我根本没点击借款就直接说我借款了
    - 是XX月XX日办理的借款，我不需要
    - 那本金外的费用怎么处理，我不会承担
    - 我就是在APP上面看了下，在考虑，就给我放款了
    - 这笔是再借一笔或者预约借款，我不要
    - 请帮我查询哪笔订单属于争议借款
    - 好了，是的，请核实客户订单
  exclude_keywords:
    - 退费进度
    - 溢余退款

tools:
  required:
    - get_customer_profile
    - get_bill_and_repayment_plan
  optional:
    - get_loan_service_info
    - get_refund_history
    - query_ticket

templates:
  first_contact:
    script: |
      为了确保信息安全，跟您简单核对几项基本资料，请问您的{verification_info}？
    required_slots:
      - verification_info
    next_step: verify_identity
  follow_up:
    script: |
      {customer_name}，您好。我非常理解您的担忧，这边会认真核查您反映的情况。
      请您告知：
      1. 您具体是指哪笔借款（借款时间/金额）？
      2. 您是如何发现这笔争议借款的？
      3. 是否已向公安机关报案？
      我们会根据您提供的信息和系统记录进行核查，如确认存在异常，会按照相关规定为您处理。
    required_slots:
      - customer_name
    next_step: investigate_dispute

branch_conditions:
  - hint: 客户声称非本人操作，系统显示正常借款流程
    variant: claimed_unauthorized_normal_process
    note: |
      核查借款申请记录：借款申请是通过您的账号完成的，包括实名认证、人脸识别、合同签署等步骤，全部操作均来自您的设备。
      如您认为账号被盗，建议立即修改密码并向公安机关报案，提供报案证明后我们进一步核查处理。
  - hint: 核实客户订单，核身后需要先确认客户争议订单
    variant: confirm_disputed_loan_order
    note: |
      先询问“请问您需要查询哪笔订单呢”，确认订单日期、金额、产品或业务号。
      若客户只回答“好了/ok/是的/好/嗯”，继续引导其确认具体订单后再判断是否属于特殊借款场景。
      不确认订单前不进入清贷、退费或费用特殊申请。
  - hint: 客户提供公安报案证明，声称被诈骗
    variant: fraud_with_police_report
    note: |
      收到报案证明后，按照诈骗借款争议流程提交工单，转专项处理团队核查。
      告知客户：我们会认真核查，处理结果将在{processing_days}个工作日内告知。
  - hint: 客户声称未收到借款金额
    variant: loan_amount_not_received
    note: |
      核查放款记录，确认放款账户和金额。如系统显示已放款，提供放款凭证（银行流水信息），建议客户核查对应银行账户。
  - hint: 客户声称是被诱导贷款
    variant: induced_loan_claim
    note: |
      了解被诱导的具体情况，核查借款申请记录。操作借款时系统均会展示相关信息及确认页面，所有信息均需本人填写上传，合同也需本人签署认可才会放款。
  - hint: 核查后确认存在异常
    variant: confirmed_anomaly
    note: 提交工单走特殊退费申请，告知处理时效
  - hint: 特殊借款场景，客户称不需要已放款订单，包含解约失败放款、预约借款、再借一笔、拆单放款悦享金或福利金
    variant: special_loan_scenario_retention_then_clearance
    note: |
      递进话术：先安抚并挽留，告知已借款成功，建议考虑保留以缓解资金压力。
      客户坚持不用时，协助结清账单，告知截止当前结清金额和扣款银行卡，确认绑定银行卡余额是否充足。
      该类特殊借款场景所有坐席均可处理；如果核实不属于特殊借款场景，一线升级二线按退费流程处理。
  - hint: 客户坚持本金外费用不承担，要求处理费用
    variant: non_principal_fee_special_application
    note: |
      在特殊借款场景且符合处理条件时，可告知账单中产生的费用将为客户特殊申请。
      递进话术：先说明可为费用做特殊申请，再收集打款银行卡信息（账户名、银行卡号、开户行），最后告知提交后正常处理时间1-4个工作日。
      不要承诺一定减免或立即到账。
  - hint: 客户提供打款银行卡信息，等待费用特殊申请处理
    variant: fee_application_bank_info_received
    note: |
      感谢客户配合，告知客服提交申请后正常处理时间为1-4个工作日。
      提醒客户期间无需重复联系，关注到账情况即可。
  - hint: 借款犹豫期内，首贷首笔客户称只是看了下或还在考虑就放款
    variant: hesitation_period_principal_clearance
    note: |
      核实订单有借款犹豫期标签且在犹豫期内，优先协助本金清贷。
      递进顺序：1）协助清贷并确认扣款银行卡余额；2）对账单中产生的费用做特殊申请，收集打款银行卡信息；3）客户已提供信息后告知1-4个工作日处理。
      若不符合犹豫期或超过处理窗口，按普通借款争议/退费流程升级。
compliance:
  forbidden_expressions:
    - 肯定是您操作的
    - 不可能被盗
    - 我们没有责任
    - 保证退款
    - 马上帮您处理
  required_disclaimer: 借款争议处理需要完整核查借款记录和相关凭证，处理时效视情况而定，请配合提供所需材料。
  must_include_when:
    - condition: 客户声称被诈骗时
      text: 如确认遭遇诈骗，建议立即向公安机关报案，并提供报案证明配合我们的核查处理。
    - condition: 核查借款记录时
      text: 借款申请记录包括实名认证、人脸识别及合同签署，所有步骤均需本人操作完成。
    - condition: 提交工单时
      text: 争议处理申请已提交，处理时效一般为5-7个工作日，结果将以短信通知您。

escalation:
  - trigger: 客户提供公安报案证明
  - trigger: 核查发现借款流程存在异常
  - trigger: 涉及金额较大的借款争议
  - trigger: 客户声称将采取法律行动

fallback:
  answer: 关于借款争议，需要详细核查您的借款记录，请先配合核实身份信息，并提供争议借款的相关信息。
  next_step: verify_identity
slot_sources:
  customer_name: tool:get_customer_profile.name
  verification_info: derived:verification_info
escalation_signals: []
