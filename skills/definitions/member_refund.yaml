---
skill_id: member_refund
name: 退会员费用
description: 客户要求退还会员费用的处理场景。需先核身验证，查询系统确认会员服务，了解退费原因并进行挽留。挽留失败后根据权益使用情况处理退费：权益生效中协助全额退费；外部权益已过期或已使用则协商部分退费；仅音乐健身已使用时先挽留再协商部分或全额退费。一线需建超权限工单，内诉可直接处理。
domain: 会员
intent_hierarchy:
  l1: 会员服务
  l2: 退会员费用
  l3: 会员
route_mode: tool_only
risk_level: medium


triggers:
  keywords:
    - 退会员费
    - 会员退款
    - 退钱
    - 会员扣费退回
    - 会员费退还
    - 会员被扣费要退
    - 私自扣钱
    - 会员卡
    - 会员卡扣了我钱
    - 会员卡扣了钱
    - 块钱的会员
    - 扣了我会员费
    - 扣了230
    - 扣了两百多
    - 中云
    - 中环
    - 云星
    - 第三方会员
    - 我不需要的会员
    - 没开过会员
  examples:
    - 这会员是什么情况？有个会员被扣费了，我要退
    - 不小心点错了，可以退会员费吗？
    - 我根本没开过会员，你们没经过我同意就扣钱，我要退款
    - 申请借款失败了，要求退会员费
    - 会员权益券无法使用，要求退费
    - 中云/中环/云星扣了我230块钱的会员卡，要退费
    - 借款时被扣了会员费，要退
  exclude_keywords:
    - 取消会员
    - 会员是什么
    - 会员咨询

tools:
  required:
    - get_customer_profile
    - get_membership_service_info
  optional:
    - get_bill_and_repayment_plan
    - get_refund_history
    - query_ticket
    - get_loan_service_info
templates:
  first_contact:
    script: |
      为了确保信息安全，跟您简单核对几项基本资料，请问您的{verify_question}？
    required_slots:
      - verify_question
    next_step: verify_identity
  follow_up:
    script: |
      （系统未查到）您好，请问您是通过什么路径查询到有这个服务的呢？客服暂未查询到，建议您再核实下哦。

      （系统查到）您好，客服查询到您有一个会员尊享服务，与您核实下金额{member_fee}元，是这笔服务订单，对吗？

      （挽留-误点击）{customer_name}先生/女士，您好，我们会员购买时会有弹窗提示，会让您进行确认。且会员购买后权益立即生效，我们会员权益有优惠券、视频会员券、音乐会员券、美食代金券等，性价比很高的，建议您可以尝试使用一下。

      （挽留-未授权扣款）{customer_name}先生/女士，您好，我司是不会擅自从您卡上扣钱的，会员扣费的前提是您在APP操作了开通会员，可能是您开通的时候没有注意到无意操作了。查看到您是在{loan_date}借款时操作的开通会员，您可以回忆下是否操作了这笔借款。

      （已开通自动续费，先关闭）如果您暂时不需要的话可以帮您取消会员续费，后续不会再进行扣费，您当月购买的权益因为已经生效，建议您登录APP查询具体权益内容，您在生活中肯定用的上的。

      （权益生效中，退费）这边帮您特殊申请，预计1-4个工作日会原路退回，您注意查收哦。

      （权益已过期/已使用，协商部分退）您好，这边查询您的权益已过期/已失效，目前确实无法全额退回，确实很抱歉。目前可以为您特殊申请{partial_refund_amount}元（部分退费），您看可以吗？
    required_slots:
      - customer_name
      - loan_date
      - member_fee
      - partial_refund_amount
    next_step: resolve_refund

branch_conditions:
  - hint: 挽留成功
    variant: retain_success
    note: 感谢支持，询问是否有其他问题
  - hint: 已开通自动续费，客户坚持
    variant: auto_renewal_cancel
    note: 先关闭自动续费，再说明当月权益已生效建议使用
  - hint: 未开通自动续费，客户坚持退费
    variant: no_auto_renewal
    note: 直接进入退费判断流程
  - hint: 权益生效中
    variant: active_benefits
    note: 协助全额退费，告知1-4工作日原路退回
  - hint: 外部权益已过期或已使用
    variant: expired_or_used
    note: 先婉拒，说明无法全额退回，协商部分退费金额；客户不接受则升级主管；内诉可直接处理
  - hint: 仅音乐健身（29元）已完结，其他未使用
    variant: music_fitness_used
    note: 先告知音乐健身权益使用方法挽留；不接受则优先部分退（总金额-29元）；会员费为79或98元时直接全额退
  - hint: 客户坚持全额退费且一线无法处理
    variant: escalate_to_supervisor
    note: 一线建超权限工单升级主管；内诉可直接系统操作退费
compliance:
  forbidden_expressions:
    - 私自扣款
    - 我们违法了
    - 保证退款
    - 马上退
    - 砍头息
  required_disclaimer: 退费申请已提交，预计1-4个工作日原路退回，请注意查收。部分退费以系统显示金额为准。
  must_include_when:
    - condition: 客户提及私自扣钱或违法
      text: 我司不会擅自扣款，会员扣费前提是您在APP操作了开通，购买前均有弹窗提示确认。
    - condition: 客户提及放款失败要求退费
      text: 购买会员与资金方的放款审核结果无关，审核失败可过几天再申请，会员权益仍可正常使用。

escalation:
  - trigger: 客户情绪激动且坚持全额退费，一线建超权限工单升级主管
  - trigger: 客户扬言外诉、自杀或报复社会等风险行为，立即升级处理
  - trigger: 客户对部分退费结果不满坚持全额，内诉可直接处理，一线建超权限工单

fallback:
  answer: 您好，关于会员退费申请，我们已记录您的诉求，将为您特殊申请处理，预计1-4个工作日原路退回，请注意查收。如有疑问请再次联系客服。
  next_step: create_escalation_ticket
slot_sources:
  customer_name: tool:get_customer_profile.name
  loan_date: tool:get_loan_service_info.loan
  member_fee: tool:get_membership_service_info.member
  partial_refund_amount: llm:partial_refund_amount
  verify_question: system:verify_question
escalation_signals: []
