---
skill_id: repayment_status_issue
name: 还款状态异常
description: |
  合并场景：客户反映还款过程中出现任何异常，统一入口。具体包括：
  (1) 扣款失败/还不进去（余额不足、银行卡签约问题、卡控、限额、通道问题）
  (2) 已还款但系统/APP 未更新、部分扣款、重复扣款、显示未到账
  (3) 已做自动扣款但金额不足/仅扣部分
  (4) 对公还款已转账/已打款但未入账、账单未更新、仍显示未还或还款状态异常
  客户视角下这些是"钱到底扣了没有"的同一个诉求；SOP 侧依据扣款状态（成功/失败/部分成功）走不同分支处理。
  与 overpayment_refund 的区别：本场景处理入账异常，overpayment_refund 处理客户主动多付/溢余退款。
  与 early_loan_clearance 的区别：本场景针对常规扣款异常，early_loan_clearance 针对客户主动发起的一次性结清。
domain: 还款
intent_hierarchy:
  l1: 还款相关
  l2: 还款状态异常
  l3: 还款
route_mode: tool_only
risk_level: medium


