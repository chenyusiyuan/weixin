---
skill_id: overpayment_refund
name: 客户对公转账出错退溢余
description: |
  仅处理客户对公转账明确转错、转多或误转后，要求退回/退款/退溢余的核实与退款场景。
  强触发必须同时具备“转错/转多/误转/溢余/非本人或非当期账单”等错误转账证据，以及“退回/退款/原路退/退溢余”等退回诉求。
  即使客户说“转错/打错/输错”，只要后续诉求是“补一下/补差/补款/差额怎么补”，而不是把已转款项退回，就不属于本场景。
  不处理正常对公还款账号咨询、对公还款备注、对公还款已转账但账单未更新/未入账、少转补差、核实催收专员或对公账号真假；这些分别归 repayment_method_inquiry、repayment_status_issue、repayment_result_query、post_loan_verification。
domain: 费用
intent_hierarchy:
  l1: 费用相关
  l2: 退溢余
  l3: 费用
route_mode: tool_only
risk_level: medium


triggers:
  keywords:
    - 退溢余
    - 对公误转退款
    - 对公转多退款
    - 原路退回
    - 溢余退款
    - 转错了要退款
    - 多转了要退
    - 转多了要退
    - 误转要求退回
    - 转到非本人账单
    - 不是这期账单
    - 对公转错
    - 对公误转
    - 多打了
    - 多汇了
    - 手持说明
    - 情况说明
  examples:
    - 我对公转账转错了，要把这笔钱退回来
    - 我对公多转了钱，溢余部分怎么原路退回
    - 我误转到你们公司对公账户了，不是我的账单，能不能退款
    - 溢余款项如何申请退还
    - 是贷款金额XX元的，我对公转错了，想申请退溢余
    - 我对公转多了，怎么原路退回
    - 我把钱转到你们对公账号了，但不是这期账单，想退回来
    - 我打到对公账户的钱不是我的账单，能不能退回来
    - 我已经提交手持情况说明，误转的钱多久能退回
  exclude_keywords:
    - 退费
    - 担保费退款
    - 利息退款
    - 对公账号是多少
    - 对公账户是多少
    - 发一个对公账号
    - 发一下对公账号
    - 对公还款账号
    - 对公还款账户
    - 对公还款
    - 核实账号
    - 核实账户
    - 这个账号是不是你们的
    - 是不是你们公司的对公账号
    - 公户信息
    - 专员让我转
    - 已经转过去了
    - 已经打过去了
    - 什么时候更新
    - 账单没更新
    - 还没入账
    - 没入账
    - 上传凭证
    - 还款凭证
    - 备注什么
    - 怎么备注
    - 少转
    - 转少
    - 少转了
    - 差额怎么补
    - 补一下
    - 补差
    - 补差额
    - 补缴差额
    - 补款

tools:
  required:
    - get_customer_profile
    - get_bill_and_repayment_plan
  optional:
    - get_loan_service_info
    - get_refund_history

templates:
  first_contact:
    script: |
      为了确保信息安全，跟您简单核对几项基本资料，请问您的{verification_info}？
    required_slots:
      - verification_info
    next_step: verify_identity
  follow_up:
    script: |
      {customer_name}，您好。这边已收到您关于对公转账出错的申请。
      请您提供以下信息以便核实：
      1. 转账时间：{transfer_date}
      2. 转账金额：{transfer_amount}元
      3. 转账凭证（截图或流水号）
      核实确认后，会根据实际情况判断是否属于退溢余情形；如确认为溢余退款，退款将退回您的原转出账户，处理时效一般为3-7个工作日。
    required_slots:
      - customer_name
      - transfer_amount
      - transfer_date
    next_step: verify_transfer_info

branch_conditions:
  - hint: 转账信息核实成功，金额与系统匹配
    variant: transfer_verified_full_match
    note: 确认溢余金额，发起全额退款申请
  - hint: 转账金额超出账单金额（有真实溢余）
    variant: genuine_overpayment
    note: 核实溢余金额（转账金额 - 账单金额），仅退还溢余部分
  - hint: 转账金额与账单金额一致（非溢余）
    variant: no_overpayment
    note: 告知客户转账金额已抵扣账单，无溢余可退，账单已更新
  - hint: 客户提供凭证信息不完整
    variant: incomplete_proof
    note: 请客户补充完整转账凭证（包含转账时间、金额、收款账户信息）
  - hint: 客户表示对公误转或转多了，尚未核实收款账号
    variant: collect_corporate_account_for_verification
    note: |
      递进话术：先请客户提供转入对公账号、转账时间、金额和转账凭证，为其核实具体情况。
      不要在未核实前承诺可以退回。
  - hint: 核实收款账号为我司对公账号，且转账金额非客户名下应还当期或逾期账单
    variant: corporate_mis_transfer_requires_statement
    note: |
      引导客户提供“本人+手持说明”照片和转账记录。
      说明内容需包含真实姓名、身份证号、转账时间、误转金额、收款账号、请求退回金额、本人承诺情况属实、签名和日期。
      凭证齐全后建【退溢余】-存对公误转，由作业组发起退费申请。
  - hint: 核实收款账号并非我司对公账号
    variant: not_our_corporate_account
    note: 告知该账号并非我司对公账号，建议客户再核实确认或联系银行查询收款方。
  - hint: 客户已提供完整凭证和情况说明
    variant: proof_received_wait_refund
    note: |
      告知凭证已收到，预计1-6个工作日原路退回，请客户注意查收。
      在此期间无需重复进线；不要承诺当天到账。
compliance:
  forbidden_expressions:
    - 马上退款
    - 立刻到账
    - 肯定能退
  required_disclaimer: 对公转账出错需先核实转账凭证、账单金额和入账状态；涉及退款时，退款金额以实际溢余为准，退回原转出账户，处理时效为3-7个工作日。
  must_include_when:
    - condition: 发起退款申请时
      text: 退款申请已提交，处理时效一般为3-7个工作日，退款将原路退回至您的转出账户。
    - condition: 客户提供凭证时
      text: 请保留转账凭证原件，以便后续核查使用。

escalation:
  - trigger: 转账金额较大，超出一线处理权限
  - trigger: 客户无法提供有效转账凭证
  - trigger: 系统无对应收款记录

fallback:
  answer: 关于对公转账出错退溢余，需要您提供转账凭证配合核实，请先配合提供核身信息和转账详情。核实后会根据实际情况判断是否属于溢余退款或误转退回场景。
  next_step: verify_identity
slot_sources:
  customer_name: tool:get_customer_profile.name
  transfer_amount: llm:transfer_amount
  transfer_date: llm:transfer_date
  verification_info: derived:verification_info
escalation_signals: []
