---
skill_id: loan_consultation
name: 贷款咨询
description: 处理客户咨询贷款产品信息的场景，包括贷款用途要求、申请条件、资料要求、利率、放款时效、审核规则等通用咨询问题。属于低风险业务，无需核身，仅需询问客户姓氏以礼貌称呼。通过系统查询客户状态后给予针对性解答。
domain: 贷款
intent_hierarchy:
  l1: 申请咨询
  l2: 贷款咨询
  l3: 贷款
route_mode: tool_only
risk_level: low


triggers:
  keywords:
    - 怎么贷款
    - 贷款条件
    - 贷款要求
    - 申请贷款
    - 贷款利率
    - 贷款用途
    - 能贷多少
    - 贷款资质
    - 怎么申请
    - 贷款流程
    - 贷款性质
    - 最高额度
    - 审核电话
    - 审核中
    - 审核不通过
    - 放款平台
    - 担保
    - 预约借款金额
    - 综合评估
  examples:
    - 你们贷款有什么要求吗
    - 申请贷款需要准备什么资料
    - 你们贷款利率是多少
    - 贷款用途有什么限制吗
    - 我的资质能申请贷款吗
    - 你们公司贷款产品对于贷款用途有要求吗
    - 都可以用于哪些用途
    - 贷款有担保吗
    - 你们公司的贷款是什么性质的贷款
    - 卡卡贷豆豆钱最高可贷额度是多少
    - 我申请的是10000为什么最终只放款8000
    - 提交那么多资料审核却通不过，是不是骗资料
    - 我已经操作提现了为什么还在审核中
    - 审核电话没接到怎么办
    - 审核通过后多久可以收到款项
    - 为什么在豆豆钱申请，最终是别的平台放款
  exclude_keywords:
    - 放款进度
    - 取消贷款
    - 解约
    - 异地放款

tools:
  required:
    - get_customer_profile
    - get_loan_service_info
  optional:
    - get_bill_and_repayment_plan
    - get_quota_service_info

templates:
  first_contact:
    script: "为了更好的与您沟通，请问怎么称呼您呢？"
    required_slots: []
    next_step: ask_specific_question
  follow_up:
    script: "{customer_name}，您好，请问您具体遇到什么问题了呢？客服为您协助处理下哦。"
    required_slots:
      - customer_name
    next_step: answer_loan_query

branch_conditions:
  - hint: 客户咨询贷款用途限制
    variant: loan_purpose_explanation
    note: 告知仅用于消费，不得用于购房、购车、投资、购买理财产品等
  - hint: 客户咨询申请条件/资质
    variant: eligibility_explanation
    note: 系统根据婚姻状态、职业背景、征信情况等综合评估，不承诺具体通过率
  - hint: 客户咨询申请资料
    variant: document_requirements
    note: 注册实名：身份证正反面、基本资料、人脸识别、银行卡四要素验证，紧急联系人2位；要求银行预留手机号与网银/电话银行/手机银行一致
  - hint: 客户咨询放款时效
    variant: disbursement_timeline
    note: 系统授信常规3天；申请提现审核1-2天；放款一般1-10个工作日，最快当天
  - hint: 审核被拒或评分不足
    variant: rejection_explanation
    note: 告知系统综合评分不足，人工无法干预，建议过段时间再尝试申请
  - hint: 客户咨询贷款性质、放贷主体或是否平台自营放贷
    variant: loan_nature_and_lender_explanation
    note: |
      告知产品是纯线上、无抵押的互联网智能信贷产品。
      如客户问“你们公司放贷吗/到底哪个公司发放”，说明我司提供贷款咨询与服务，放贷方为具备合法放款资质的合作机构。
  - hint: 客户咨询贷款是否有担保
    variant: guarantee_explanation_pre_and_post_loan
    note: |
      贷前：说明是否需要担保由系统根据客户资质自动判断，申请过程中合同会明确贷款和担保信息。
      贷后：根据系统查询结果回复；显示有担保则引导客户查看担保合同，显示无担保费用或信息则按系统结果告知无担保。
  - hint: 客户咨询最高额度或可贷额度
    variant: max_quota_explanation
    note: 最高额度可说明为20万，但必须强调具体以系统综合评估结果为准，不承诺客户一定可获得。
  - hint: 客户质疑预约借款金额和实际放款金额不一致
    variant: reserved_amount_actual_disbursement_gap
    note: |
      告知客户借款时签署了相关协议，最终放款金额以实际放款金额为准，提现展示金额仅作参考。
      客户情绪激动时先安抚，再转放款/借款争议相关流程继续处理。
  - hint: 客户质疑提交资料后审核不通过或认为平台骗取资料
    variant: application_rejected_data_concern
    note: |
      先表达理解和歉意，再说明产品由系统自动审核，综合评分不足时无法通过，人工无法干预。
      可说明平台也希望客户成功借款，但需符合系统评估；建议过段时间再尝试申请或了解其他产品。
  - hint: 客户已提现，咨询审核中多久出结果或审核电话未接
    variant: withdrawal_review_and_call_missed
    note: |
      已提现审核一般1-2个工作日，具体以产品流程展示时间告知。
      审核电话没接到时，安抚客户不用担心，审核人员会在不同时间段再次来电，提醒保持手机畅通。
  - hint: 客户咨询审核通过后多久放款
    variant: approved_disbursement_timeline
    note: 审核通过后一般1-10个工作日左右放款，最快当天到账，具体以实际到账为准。
  - hint: 客户深入追问资金用途控制或媒体类问题
    variant: deep_usage_control_or_media_followup
    note: |
      先确认客户当前操作步骤，必要时查询状态。
      未提现时说明提现后仍会再次审核，审核通过后才放款；审核被拒/未获取额度分别按对应状态解释。
      客户继续深入追问或涉及媒体时，记录问题并反馈相关部门，告知预计3个工作日内专员回复。
compliance:
  forbidden_expressions:
    - 保证通过
    - 一定能贷到
    - 保证放款
    - 我们可以帮您调整审核结果
  required_disclaimer: 贷款审核由系统自动评估，人工无法干预审核结果
  must_include_when:
    - condition: 客户问贷款用途
      text: 贷款用途主要用于消费，不得用于购房、购车、投资、购买理财产品等

escalation:
  - trigger: 客户对审核结果强烈不满，要求人工介入
  - trigger: 客户反映提交资料后系统长时间无响应

fallback:
  answer: "{customer_name}，您好，感谢您的关注！我司按照监管要求对申请人进行严格审核，会根据您的婚姻状态、职业背景、征信情况等进行综合评估。具体可以告诉我您目前操作到哪一步了，我来为您进一步解答。"
  next_step: collect_specific_question
slot_sources:
  customer_name: tool:get_customer_profile.name
escalation_signals: []
