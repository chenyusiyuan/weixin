---
skill_id: early_deduction
name: 未到还款日被提前扣款
description: 解释提前扣款机制，说明不同产品的扣款日规则，消除客户疑虑
domain: 还款
intent_hierarchy:
  l1: 还款相关
  l2: 提前扣款
  l3: 还款
route_mode: tool_only
risk_level: medium


triggers:
  keywords:
    - 提前扣款
    - 未到还款日
    - 提前扣了
    - 没到还款日就扣
    - 提前划扣
    - 早扣了
    - 还没到期就扣
    - 提前扣款短信
    - 提前3天扣款
    - 提前4天扣款
    - 关闭提前扣款
    - 不同意提前扣款
    - 扣款未成功
    - 未收到短信
  examples:
    - 还没到还款日为什么扣款了
    - 我的还款日是15号但是今天就扣了
    - 为什么提前扣款
    - 没有到还款日被扣款怎么回事
    - 提前扣款是什么情况
    - 都还没到还款时间，为什么提前3-4天就扣我的钱
    - 我收到你们要提前扣款的短信，是真的吗
    - 我不需要这个，给我关掉
    - 提前扣款没扣成功会不会产生多余费用
    - 提前扣款未成功会不会影响征信
    - 我不同意你们提前扣款
    - 今天没扣到，什么时候还会再扣
    - 我没有收到提前扣款短信
  exclude_keywords:
    - 还款失败
    - 还款方式

tools:
  required:
    - get_customer_profile
    - get_bill_and_repayment_plan
  optional:
    - get_loan_service_info

templates:
  first_contact:
    script: |
      为了确保信息安全，跟您简单核对几项基本资料，请问您的{verification_info}？
    required_slots:
      - verification_info
    next_step: verify_identity
  follow_up:
    script: |
      {customer_name}，您好。这边已为您查询了扣款记录。
      关于您反映的提前扣款情况，我们的产品采用自动扣款机制，系统会根据您的账单周期和绑定银行卡情况自动发起扣款。
      您本次扣款日期为{deduction_date}，扣款金额为{deduction_amount}元，这是正常的自动扣款操作。
      不同产品的扣款日期规则可能有所不同，具体以您签署的合同条款为准。
    required_slots:
      - customer_name
      - deduction_amount
      - deduction_date
    next_step: ask_other_questions

branch_conditions:
  - hint: 扣款日期确实早于合同约定还款日
    variant: genuine_early_deduction
    note: 需升级处理，核查系统扣款规则是否有异常
  - hint: 扣款日期符合产品规则（如提前N天预扣）
    variant: product_rule_deduction
    note: 解释该产品的扣款规则，如提前1-3天预扣属于正常机制
  - hint: 客户误解还款日与扣款日的区别
    variant: misunderstanding_due_date
    note: 说明账单日、还款日、扣款日三者的区别
  - hint: 客户收到提前扣款短信，询问是否真实或为什么提前扣
    variant: pre_deduction_sms_notice
    note: |
      递进话术：先确认短信提醒是为了减少逾期风险，再解释系统可能在还款日前发起或提醒自动扣款。
      告知客户保持绑定银行卡余额充足，具体扣款规则以合同和账单展示为准。
      如果客户仍担心短信真假，引导以官方 APP 账单和客服系统查询结果为准。
  - hint: 客户要求关闭、不保留或不同意提前扣款
    variant: decline_or_close_pre_deduction
    note: |
      先确认客户诉求是“不接受提前扣款提醒/预扣机制”，再解释自动扣款规则与账单还款义务。
      如果系统支持关闭预扣提醒或营销提醒，转对应关闭服务流程；如果不支持关闭扣款机制，告知需按合同约定在还款日前保持余额充足，可自行主动还款。
      客户坚持投诉时记录诉求并升级核实，不承诺一定关闭。
  - hint: 提前扣款未扣成功，客户担心费用或征信影响
    variant: early_deduction_failed_credit_fee_concern
    note: |
      递进话术：先说明未扣成功本身不等于已逾期，关键看还款日当天是否按时足额还款。
      提醒客户及时补足余额或通过 APP 主动还款；若到还款日仍未还清，可能产生逾期费用并影响征信。
      不要承诺“肯定不影响征信”，需以实际还款状态和征信报告为准。
  - hint: 客户询问今天没扣到后什么时候还会再扣
    variant: next_deduction_time_after_failed_attempt
    note: |
      告知系统会根据账单周期和扣款策略再次发起扣款，具体时间以系统为准。
      建议客户不要只等待自动扣款，可在 APP 主动还款或保持银行卡余额充足。
  - hint: 客户质疑未收到提前扣款短信
    variant: no_pre_deduction_sms_received
    note: |
      先安抚并核实手机号、短信拦截和 APP 消息设置；说明短信仅作提醒，不影响客户按账单还款日履约。
      如客户称未收到通知导致损失，记录凭证并升级核实。
compliance:
  forbidden_expressions:
    - 这是我们系统的问题
    - 我们扣错了
    - 保证退款
  required_disclaimer: 具体扣款规则以您签署的借款合同为准，如有疑问请查阅合同相关条款。
  must_include_when:
    - condition: 扣款确实异常时
      text: 如确认为系统异常扣款，我们会为您申请退款处理，请保留相关凭证。

escalation:
  - trigger: 确认扣款日期早于合同约定还款日且金额有误
  - trigger: 客户投诉被重复扣款

fallback:
  answer: 关于提前扣款的问题，需要为您查询账单详情，请先配合核实身份信息。
  next_step: verify_identity
slot_sources:
  customer_name: tool:get_customer_profile.name
  deduction_amount: tool:get_bill_and_repayment_plan.deduction
  deduction_date: tool:get_bill_and_repayment_plan.deduction
  verification_info: derived:verification_info
escalation_signals: []
