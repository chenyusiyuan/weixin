---
skill_id: premium_card_cancel
name: 取消优享卡
description: 客户要求取消优享卡服务的处理场景。需先核身验证，查询系统确认优享卡订单，然后询问取消原因并尝试挽留，介绍权益价值。挽留失败后在系统中直接操作取消。
domain: 优享卡
intent_hierarchy:
  l1: 优享卡服务
  l2: 取消优享卡
  l3: 优享卡
route_mode: tool_only
risk_level: medium


triggers:
  keywords:
    - 取消优享卡
    - 关闭优享卡
    - 不要优享卡
    - 取消这个服务
    - 优享卡扣费
    - 优享卡是什么情况
    - 有个扣费说是优享卡
  examples:
    - 这优享卡是什么情况？帮我取消
    - 有个优享卡扣的什么钱？
    - 刚刚有个扣费，说是优享卡，你给我查一下
    - 我不需要这个服务，给我取消优享卡
    - 你们就是强卖，给我取消
  exclude_keywords:
    - 退优享卡费用
    - 退费
    - 退款

tools:
  required:
    - get_customer_profile
  optional:
    - get_bill_and_repayment_plan
    - get_membership_service_info

templates:
  first_contact:
    script: |
      为了确保信息安全，跟您简单核对几项基本资料，请问您的{verify_question}？
    required_slots:
      - verify_question
    next_step: verify_identity
  follow_up:
    script: |
      （系统未查到）您好，请问您是通过什么路径查询到有这个服务的呢？客服暂未查询到，建议您再核实下哦。

      （系统查到）您好，客服有查询到一个优享卡尊享服务，与您核实下金额{card_amount}元，是这笔服务订单，对吗？

      （询问取消原因后挽留）{customer_name}先生/女士您好，优享卡增值服务购买前相关权益都是有展示的哦。为了更好的服务用户，平台与第三方合作为客户推出尊享增值服务，优享卡可享受会员权益，如视频会员、音乐会员等，同时还会赠送您加速放款权益、专属优惠券等服务，建议您考虑体验下哦。

      （挽留失败）非常遗憾未能给您提供更好的服务，您此次优享卡服务将为您取消，后续不会扣费，请您放心。如您之后有需要，可通过APP尝试购买哦。
    required_slots:
      - card_amount
      - customer_name
    next_step: execute_cancel_or_retain

branch_conditions:
  - hint: 系统未查询到优享卡服务
    variant: no_record
    note: 询问客户查询路径，建议再核实
  - hint: 系统查询到优享卡服务，客户原因为不小心点错
    variant: accidental_purchase
    note: 说明购买前权益有展示，属自主选择，尝试挽留
  - hint: 客户称从未点击过
    variant: deny_purchase
    note: 安抚情绪，说明系统记录，尝试挽留
  - hint: 客户称不需要该服务
    variant: not_needed
    note: 介绍权益价值，尝试挽留
  - hint: 客户称太贵了
    variant: too_expensive
    note: 强调权益丰富性价比，尝试挽留
  - hint: 客户指责强卖
    variant: forced_sale_complaint
    note: 安抚情绪，说明购买为自主选择，尝试挽留
  - hint: 挽留成功
    variant: retain_success
    note: 感谢支持，询问是否有其他问题
  - hint: 挽留失败
    variant: retain_fail
    note: 在系统中直接操作取消，告知后续不会扣费
compliance:
  forbidden_expressions:
    - 强制购买
    - 我们强卖
    - 无法取消
    - 不能退
  required_disclaimer: 优享卡服务为客户自主选择购买，取消后后续不会扣费，已产生费用按实际为准。

escalation:
  - trigger: 客户情绪激动且坚持投诉强制购买
  - trigger: 客户扬言外诉或采取极端行动

fallback:
  answer: 您好，关于优享卡取消申请，客服已为您记录，将尽快处理。取消后后续不会产生扣费，请您放心。如有疑问请再次联系客服。
  next_step: create_ticket
slot_sources:
  card_amount: llm:card_amount
  customer_name: tool:get_customer_profile.name
  verify_question: system:verify_question
escalation_signals: []
