---
skill_id: fee_refund_tier2
name: 要求退费（二线/高阶内诉）
description: 二线及高阶坐席处理复杂退费内诉，深入了解退费诉求依据，提出合规让步方案，必要时提交工单进行特殊退费处理
domain: 费用
intent_hierarchy:
  l1: 费用相关
  l2: 要求退费(二线)
  l3: 费用
route_mode: tool_rag
risk_level: high


triggers:
  keywords:
    - 内诉退费
    - 投诉退款
    - 坚持退费
    - 一线不处理
    - 找上级退费
    - 法院起诉
    - 律师函
    - 消费者协会
    - 退全部费用
    - 法务团队
    - 律师朋友
    - 网上说不合理
    - 朋友退了
    - 退担保费
    - 超24%
    - 关怀券
    - 关怀金
    - 方案不同意
    - 方案太少
    - 至少退
    - 心理底价
    - 撤诉
    - 外部投诉
  examples:
    - 一线说不能退我要找上级
    - 我要投诉你们必须退费
    - 我已经联系了律师
    - 我要去消费者协会投诉
    - 这个费用明显违法你们必须退
    - 从法务团队了解到费用不合理
    - 我问过律师，你们这个费用要退
    - 网上都说这是不合理的
    - 我朋友已经退了，为什么不给我退
    - 你就说能不能退，凭什么不给我退
    - 我要退担保费和超24%的利息
    - 我要求你们给我退全部担保费
    - 你们的方案我完全不同意，再去帮我申请
    - 不行，我要你们至少退XX元
    - 你们这方案也太少了
    - 光申请又达不到我的要求，有啥用
    - 没申请到您给我打什么电话
    - 你们老是这么申请来申请去，到底能不能处理
    - 不认可解释坚持表示投诉
    - 我就是认为你们的费用不合规不合理
    - 凭什么你们说多少方案我就要接受
    - 我已经通过别的渠道反馈了，我就要投诉
  exclude_keywords:
    - 退费进度
    - 退费到账

tools:
  required:
    - get_customer_profile
    - get_bill_and_repayment_plan
  optional:
    - get_loan_service_info
    - get_membership_service_info
    - get_refund_history
    - query_ticket
    - submit_ticket

templates:
  first_contact:
    script: |
      {customer_name}，您好，我是{agent_name}，专门负责处理复杂诉求。
      感谢您的耐心等待，我会认真了解您的情况，尽力为您提供帮助。
      请问您具体希望退还哪笔费用，退费的原因是什么呢？
    required_slots:
      - agent_name
      - customer_name
    next_step: understand_refund_basis
  follow_up:
    script: |
      {customer_name}，我已仔细了解了您的情况。
      关于您申请退还{fee_type}（{fee_amount}元）的诉求，
      我们高度重视您的反馈，会按照相关规定认真审核您的申请。
      {resolution_proposal}
    required_slots:
      - customer_name
      - fee_amount
      - fee_type
      - resolution_proposal
    next_step: confirm_resolution

branch_conditions:
  - hint: 客户提出部分退费诉求，可协商
    variant: partial_refund_negotiation
    note: |
      充分理解客户诉求后，评估是否可提供部分退费作为让步方案。需在系统权限范围内操作，超出权限需提交工单。
  - hint: 客户提出全额退费，评估合理性
    variant: full_refund_evaluation
    note: |
      核实退费依据，如客户有合理诉求（如误操作、系统错误等），按流程提交工单申请全额退费审批。
  - hint: 客户有会员权益可抵扣
    variant: membership_offset
    note: 查询客户会员信息，评估是否可用会员权益抵扣部分费用
  - hint: 客户声称遭遇诈骗或非本人操作
    variant: fraud_claim_refund
    note: |
      需核实客户陈述，收集相关证据（报案记录等），提交工单走特殊退费审批流程。
  - hint: 客户经充分协商后接受方案
    variant: customer_accepts_proposal
    note: 确认方案，发起退费申请，告知退费时效和退款路径
  - hint: 客户拒绝所有方案，坚持全额退费
    variant: no_agreement_reached
    note: |
      告知客户已尽力协商，保留投诉权利，记录通话内容作为后续处理依据，必要时上报主管处理。
  - hint: 客户引用法务团队、律师、网上信息或朋友退费作为退费依据
    variant: probe_refund_basis_and_proxy_risk
    note: |
      递进话术：先肯定客户重视合规，再追问依据来源和具体计算方式。
      法务团队：请客户说明法务认为费用不合规的主张立足点，记录后同步法务确认。
      律师朋友：询问律师获取渠道，提醒市面上存在代理维权或法律顾问欺骗消费者风险。
      网上信息：提醒网上信息众说纷纭，需要甄别，并请客户说明其计算方式。
      朋友已退：说明每个客户合同、还款情况、受理条件和处理结果不同，不能直接类比。
  - hint: 已核身后需要了解用户退费依据
    variant: understand_refund_basis_after_verification
    note: |
      递进话术：先问“请问您是通过什么方式了解到这些信息的呢？平台费用都是合法合规的哦”。
      如果客户只用“好了/ok/是的/好/嗯”承接，不要直接进入方案，继续追问退费依据、费用类型和期望金额。
      同时留意代理维权风险，必要时做代理风险提醒。
  - hint: 客户不说具体金额，只追问能不能退或凭什么不给退
    variant: ask_expected_amount_and_bottom_line
    note: |
      至少一次明确挖掘客户心理预期和金额依据。
      可递进使用：“您的需求是什么，我们愿意认真聆听”；“您目前有什么想法，可以跟我表述一下”；“需要了解大概金额，才能帮您向公司申请”。
      对时间久远订单可说明需要走特殊通道和领导审批，避免客户反复多次申请。
  - hint: 客户要求退担保费或超24%费用，需要判断是否有方案
    variant: guarantee_fee_or_over_24_negotiation
    note: |
      费用边界：本金和利息不可协商，24%内费用不协商；超24%费用、罚息/延迟支付违约金、担保费、服务咨询费需结合具体情况判断。
      同一通会话只能释放1个方案。
      无方案时告知已申请但综合评估后暂无更好方案，可约定再次回访；有方案时可释放关怀券/关怀金并确认客户是否接受。
  - hint: 客户要求退全部担保费或认为费用不合规不合理
    variant: full_guarantee_fee_refund_objection
    note: |
      递进话术：先表达理解并说明会争取方案，再明确无法承诺全部承担。
      解释关怀券/关怀金是公司基于客户体验承担部分费用，不代表承认收费不合规。
      客户继续质疑合规时，说明收费需符合国家规定和监管要求，当前方案是特殊关怀安排。
  - hint: 客户不认可解释并表示投诉或外部反馈
    variant: complaint_deescalation_before_external_channel
    note: |
      先消气和换位思考，再说明双方沟通目的是友好协商解决问题。
      覆盖客户表达：不认可解释坚持表示投诉、我就是认为费用不合规不合理、不应该收那么多。
      告知若客户选择外部渠道解决，前期内部关怀方案可能无法继续审批或落地，建议先考虑现有方案。
      如果客户已外诉，记录外诉渠道和诉求，按投诉/内外联动流程处理。
  - hint: 客户认为申请无用、方案不够或要求继续申请
    variant: repeated_application_and_price_reduction
    note: |
      递进话术：说明当前方案是已努力申请后的结果，表达持续跟进诚意。
      覆盖客户表达：你们老是这么申请来申请去到底能不能处理、没申请到您给我打什么电话、凭什么你们说多少方案我就要接受。
      引导客户说明心理底价和调整空间；同时说明方案不是坐席随意决定，公司也有费用和权限考量。
      不承诺更高方案，必要时约定回访节点。
  - hint: 客户明确说方案太少，要求至少退固定金额
    variant: customer_demands_higher_minimum_amount
    note: |
      先确认客户最低可接受金额和依据，记录心理底价。
      说明会基于其诉求和公司权限继续反馈评估，但无法承诺满足该金额。
      若当前方案已是本轮可释放方案，需说明同一通会话只能释放1个方案，后续可按约定回访。
  - hint: 客户接受关怀方案，需要进入履约或签署协议
    variant: settlement_execution_after_acceptance
    note: |
      先确认方案内容、金额、券或关怀金形式，再判断是否需要签署和解协议。
      涉及需签署协议的，签署前必须告知协议提醒；客户同意后发送和解函，并关注签署结果。
      后续按方案类型执行打款、还款抵扣券或外部券履约，不要在签署前履约。
compliance:
  forbidden_expressions:
    - 我们肯定给您退
    - 随时可以退
    - 这个费用本来就不该收
    - 我们收错了
    - 保证全退
  required_disclaimer: 退费申请需经审核，具体退费金额及时效以审核结果为准，退款将退回原支付账户。
  must_include_when:
    - condition: 提交退费工单时
      text: 退费申请已提交审核，审核时效一般为3-5个工作日，结果将以短信通知您。
    - condition: 客户提及法律行动时
      text: 我们尊重您的权利，同时也请您相信我们会依法合规处理您的诉求。
    - condition: 涉及诈骗声称时
      text: 如确认为诈骗行为，建议您及时向公安机关报案，并提供报案证明配合我们处理。

escalation:
  - trigger: 客户声称已聘请律师或提起诉讼
  - trigger: 涉及媒体曝光或集体投诉
  - trigger: 退费金额超出二线处理权限

fallback:
  answer: 关于退费诉求，我们会认真核实您的情况，按照相关规定为您处理。请提供具体的退费原因和相关凭证，以便我们尽快为您处理。
  next_step: understand_refund_basis
slot_sources:
  agent_name: system:agent_name
  customer_name: tool:get_customer_profile.name
  fee_amount: tool:get_bill_and_repayment_plan.fee
  fee_type: tool:get_bill_and_repayment_plan.fee
  resolution_proposal: llm:resolution_proposal
escalation_signals:
  - 律师
  - 法院
  - 起诉
  - 消费者协会
  - 消协
  - 媒体
  - 投诉到底
  - 找上级
  - 坚持退费
  - 内诉
priority: 20
